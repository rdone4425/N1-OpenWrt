name: Build ImmortalWrt-25.12 for armsr_armv8

on:
  workflow_dispatch:
   inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false
  schedule:
    - cron: "0 0 1,16 * *"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free up space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update > /dev/null
        sudo -E apt-get -qq install -y $(curl -fsSL https://raw.githubusercontent.com/nantayo/My-Pkg/master/openwrt) > /dev/null
        sudo -E apt-get -qq autoremove --purge > /dev/null
        sudo -E apt-get -qq clean > /dev/null
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        echo "FILE_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV

    - name: Update & Install feeds
      run: |
        chmod +x armsr/armv8/diy/diy.sh
        chmod +x armsr/armv8/diy/optimize.sh
        cd openwrt
        ./scripts/feeds update -a
        $GITHUB_WORKSPACE/armsr/armv8/diy/diy.sh

        # 禁用 Rust CI LLVM 下载，防止网络 404 错误
        if [ -f feeds/packages/lang/rust/bootstrap.toml ]; then
          echo "正在优化 Rust 配置..."
          # 备份原文件
          cp feeds/packages/lang/rust/bootstrap.toml feeds/packages/lang/rust/bootstrap.toml.bak
          # 禁用 CI LLVM 下载
          sed -i '/\[llvm\]/a\download-ci-llvm = false' feeds/packages/lang/rust/bootstrap.toml || true
          # 如果已存在配置，则修改
          sed -i 's/download-ci-llvm = true/download-ci-llvm = false/g' feeds/packages/lang/rust/bootstrap.toml
        fi

        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Run build optimizations
      working-directory: ./openwrt
      run: |
        $GITHUB_WORKSPACE/armsr/armv8/diy/optimize.sh

    - name: Load N1 custom config
      run: |
        rm -rf openwrt/files openwrt/.config
        mv armsr/armv8/N1/files armsr/armv8/N1/.config openwrt/

    - name: Restore compile cache
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: openwrt-dl-${{ github.run_id }}
        restore-keys: |
          openwrt-dl-

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: openwrt/.ccache
        key: openwrt-ccache-${{ github.run_id }}
        restore-keys: |
          openwrt-ccache-

    - name: SSH connect to Actions
      uses: P3TERX/ssh2actions@main
      if: github.event.inputs.ssh == 'true'

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j$(( $(nproc) * 2 ))
        find dl -size -1k -exec rm -f {} \;

    - name: Compile N1 firmware
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) thread compile"
        # 第一次尝试：最大并发编译
        if make -j$(( $(nproc) + 1 )); then
          echo "Build succeeded"
        else
          echo "Build failed, retrying with single thread..."
          # 重试：单线程编译并输出详细信息
          make -j1 V=s || {
            echo "Build failed again. Trying with Rust LLVM workaround..."
            # 禁用 Rust CI LLVM 下载，允许本地编译
            sed -i 's/download-ci-llvm = true/download-ci-llvm = false/g' feeds/packages/lang/rust/bootstrap.toml 2>/dev/null || true
            make -j1 V=s
          }
        fi
      continue-on-error: true
      timeout-minutes: 240

    - name: Package N1 firmware
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz
        KERNEL_REPO_URL: breakingbadboy/OpenWrt
        KERNEL_VERSION_NAME: 6.12.y
        PACKAGE_SOC: diy
        GZIP_IMGS: .xz
        SCRIPT_DIY_PATH: armsr/armv8/N1/mk_s905d_n1.sh
        WHOAMI: nantayo
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      with:
        tag_name: OpenWrt_${{ env.FILE_DATE }}
        files: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.xz
        body: |
          首次使用建议全新刷写
          * 基本信息
          IP: 192.168.2.2
          账户: root
          密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 2
        delete_tags : true
